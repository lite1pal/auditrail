services:
  postgres:
    image: postgres:17-alpine
    container_name: auditrail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: auditrail
      POSTGRES_USER: auditrail
      POSTGRES_PASSWORD: auditrail
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auditrail -d auditrail"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
